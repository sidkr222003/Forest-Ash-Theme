      <circle cx="86"  cy="170" r="3.5" fill="#e8c058" fill-opacity="0.82"/>
      <circle cx="164" cy="157" r="3"   fill="#e8c058" fill-opacity="0.72"/>
      <circle cx="62"  cy="142" r="2.5" fill="#e0b040" fill-opacity="0.68"/>
      <circle cx="192" cy="174" r="3.5" fill="#e8c058" fill-opacity="0.78"/>
      <circle cx="144" cy="188" r="2.5" fill="#e0b040" fill-opacity="0.52"/>
      <circle cx="106" cy="198" r="3"   fill="#e8c058" fill-opacity="0.62"/>
      <circle cx="42"  cy="110" r="2"   fill="#d0a038" fill-opacity="0.58"/>
      <circle cx="212" cy="118" r="2.5" fill="#d0a038" fill-opacity="0.62"/>
      <circle cx="118" cy="214" r="2"   fill="#e8c058" fill-opacity="0.46"/>
      <circle cx="176" cy="210" r="2.5" fill="#d0a038" fill-opacity="0.52"/>
      <circle cx="70"  cy="208" r="2"   fill="#d0a038" fill-opacity="0.42"/>
      <circle cx="200" cy="228" r="1.8" fill="#c89030" fill-opacity="0.38"/>
      <circle cx="56"  cy="232" r="1.8" fill="#c89030" fill-opacity="0.36"/>
    </g>

  </g><!-- end clip group -->

  <!-- Outer border (subtle frame) -->
  <rect width="256" height="256" rx="42"
        fill="none" stroke="#2e4834" stroke-width="2.5" stroke-opacity="0.55"/>
</svg>