      <ellipse cx="224" cy="180" rx="9"  ry="5"   transform="rotate( 36, 224,180)"/>
      <ellipse cx="222" cy="104" rx="8"  ry="4.5" transform="rotate(-42, 222,104)"/>
      <ellipse cx="28"  cy="90"  rx="8"  ry="4.5" transform="rotate( 32,  28, 90)"/>
      <ellipse cx="18"  cy="170" rx="7"  ry="4"   transform="rotate( 10,  18,170)"/>
      <ellipse cx="238" cy="196" rx="7"  ry="4"   transform="rotate(-18, 238,196)"/>
    </g>

    <!-- Ember / firefly particles (glowing) -->
